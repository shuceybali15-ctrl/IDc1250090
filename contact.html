<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nala Soo Xiriir — Jabir Farah Abdulle Ice Cream Parlor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFFBF3;
    --mint:#E7F5EC;
    --berry:#C5285D;
    --berry-dark:#9E1E49;
    --choc:#432A22;
    --choc-soft:#6B4A3E;
    --line:#EADFCF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--cream);color:var(--choc);
    font-family:'Nunito',sans-serif;font-size:17px;line-height:1.55;
  }
  h1{font-family:'Fraunces',serif;margin:0 0 .3em 0;color:var(--choc);letter-spacing:-0.01em;}
  .wrap{max-width:640px;margin:0 auto;padding:0 24px;}

  .brand-bar{padding:24px;text-align:center;}
  .shop-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:var(--choc);}

  .page-hero{background:var(--mint);padding:50px 24px 60px;text-align:center;}
  .eyebrow{
    display:inline-block;font-weight:800;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--berry-dark);background:#fff;border:1px solid var(--berry);padding:6px 14px;border-radius:999px;margin-bottom:18px;
  }
  .page-hero h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:600;}
  .page-hero p{color:var(--choc-soft);max-width:48ch;margin:14px auto 0;font-size:1rem;}

  .section{padding:60px 24px 90px;}
  form{
    background:#fff;border:1px solid var(--line);border-radius:24px;padding:36px;
    max-width:560px;margin:0 auto;
  }
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
  label{font-weight:700;font-size:.85rem;color:var(--choc);}
  input, textarea{
    font-family:'Nunito',sans-serif;font-size:.95rem;padding:12px 14px;border-radius:12px;
    border:1.5px solid var(--line);background:var(--cream);color:var(--choc);
  }
  input:focus, textarea:focus{outline:none;border-color:var(--berry);box-shadow:0 0 0 3px rgba(197,40,93,.15);}
  textarea{resize:vertical;min-height:140px;}
  .submit-btn{
    width:100%;border:none;cursor:pointer;background:var(--berry);color:#fff;font-weight:800;
    font-size:1rem;padding:15px;border-radius:999px;margin-top:4px;
  }
 .jaabir nav ul {
    list-style: none;   
    display: flex;         
    justify-content: flex-end;
    gap: 20px;
    margin: 0;
    padding: 15px;
}

nav ul li a {
    text-decoration: none;
    color: black;
    font-size: 18px;
}
.jaabir a:hover{
  background-color: #FFCB47;
  border-radius: 15px;
  transition: 1.0s;
  transform: scale(0.05s);

}
    
  
  .submit-btn:hover{background:var(--berry-dark);}

  footer{background:var(--choc);color:#E7D9CF;padding:32px 24px;margin-top:20px;text-align:center;font-size:.85rem;}
</style>
</head>
<body>
    <div class="jaabir">
    <nav>
        <ul>
            <li>
                <a href="shaale.html">Home</a>
            </li>
             <li>
                <a href="About.html">About</a>
            </li>
             <li>
                <a href="contact.html">log in</a>
            </li>
             <li>
                <a href="Log in.html">contact</a>
            </li>
        </ul>
    </nav>
    </div>


<div class="brand-bar">
  <div class="shop-name">Jabir Farah Abdulle Ice Cream</div>
</div>

<section class="page-hero">
  <div class="wrap">
    <span class="eyebrow">Nala Soo Xiriir</span>
    <h1>Qor Cabashadaada</h1>
    <p>Haddii aad qabto cabasho ama faallo ku saabsan adeegayagaanka, foomka hoose buuxi — waan ka jawaabi doonaa dhaqso.</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <form action="#" method="get">
      <div class="field">
        <label for="cname">Magaca</label>
        <input type="text" id="cname" name="cname" placeholder="Tusaale: Cali Xasan" required>
      </div>
      <div class="field">
        <label for="cphone">Telefoon</label>
        <input type="tel" id="cphone" name="cphone" placeholder="+252 ..." required>
      </div>
      <div class="field">
        <label for="ccomplaint">Cabashada</label>
        <textarea id="ccomplaint" name="ccomplaint" placeholder="Qor cabashadaada halkan..." required></textarea>
      </div>
      <button type="submit" class="submit-btn">Dir Cabashada</button>
    </form>
  </div>
</section>

<footer>
  <p>© Jabir Farax — Ice Cream</p>
</footer>

</body>
</html>
